<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Grand Line Adventure – One Piece 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Georgia, serif; }
    #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 10px 14px; pointer-events: none; z-index: 10;
    }
    .hud-panel {
      background: rgba(0,0,0,0.55); border: 2px solid #FFD700;
      border-radius: 10px; padding: 6px 12px; color: #fff; font-size: 13px; min-width: 110px;
    }
    .hud-label { color: #FFD700; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
    .hud-value { font-size: 18px; font-weight: bold; }
    #health-wrap { background: #333; border-radius: 4px; height: 8px; margin-top: 4px; }
    #health-bar  { height: 8px; border-radius: 4px; background: #2ecc40; width: 100%; transition: width .3s; }
    #stars { font-size: 16px; }

    #crew-tag {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); border: 2px solid #FFD700; border-radius: 20px;
      color: #FFD700; padding: 4px 18px; font-size: 14px; display: none; z-index: 11;
    }

    #minimap-wrap { position: fixed; bottom: 16px; right: 16px; z-index: 10; border-radius: 8px; overflow: hidden; }
    #minimap { display: block; }

    #speed-box {
      position: fixed; bottom: 16px; right: 150px; z-index: 10;
      background: rgba(0,0,0,0.6); border: 2px solid #FFD700;
      border-radius: 10px; color: #fff; padding: 8px 14px; text-align: center;
    }
    #speed-box .sn { font-size: 26px; font-weight: bold; color: #FFD700; }
    #speed-box .su { font-size: 11px; color: #aaa; }

    #interact-hint {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); border: 2px solid #FFD700; border-radius: 20px;
      color: #FFD700; padding: 6px 22px; font-size: 14px; display: none; z-index: 11;
    }

    #notification {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); border: 2px solid #FF4136; border-radius: 20px;
      color: #fff; padding: 8px 24px; font-size: 15px; z-index: 20;
      opacity: 0; transition: opacity 0.4s; pointer-events: none; white-space: nowrap;
    }

    #joystick-zone {
      position: fixed; bottom: 20px; left: 20px;
      width: 120px; height: 120px; z-index: 15; touch-action: none;
    }
    #joystick-base {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 3px solid rgba(255,215,0,0.6); position: absolute;
    }
    #joystick-thumb {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,215,0,0.8); border: 2px solid #fff;
      position: absolute; left: 40px; top: 40px; display: none;
    }

    #cam-zone {
      position: fixed; top: 0; right: 0; width: 55%; height: 100%;
      z-index: 5; touch-action: none;
    }

    #buttons {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 15;
    }
    .btn {
      background: rgba(0,0,0,0.7); border: 2px solid #FFD700;
      color: #FFD700; border-radius: 10px; padding: 10px 16px;
      font-size: 13px; font-weight: bold; cursor: pointer;
      touch-action: manipulation; user-select: none;
    }
    .btn:active { background: rgba(255,215,0,0.3); }
    #attack-btn { border-color: #FF4136; color: #FF4136; }
    #attack-btn:active { background: rgba(255,65,50,0.3); }

    #loading {
      position: fixed; inset: 0; background: #050510;
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }
    #loading h1 { color: #FFD700; font-size: 32px; margin-bottom: 8px; }
    #loading p  { color: #888; font-size: 14px; }
    #lbar-wrap  { width: 260px; height: 8px; background: #222; border-radius: 4px; margin-top: 20px; }
    #lbar       { height: 8px; background: #FFD700; border-radius: 4px; width: 0; transition: width .3s; }

    #ctrl-hint {
      position: fixed; bottom: 16px; left: 150px;
      color: rgba(255,255,255,0.4); font-size: 11px; z-index: 10;
      pointer-events: none; line-height: 1.7;
    }
  </style>
</head>
<body>

<div id="loading">
  <h1>⛵ Grand Line Adventure</h1>
  <p>One Piece – Open World 3D</p>
  <div id="lbar-wrap"><div id="lbar"></div></div>
  <p style="margin-top:12px;font-size:12px;color:#555;">Chargement du monde...</p>
</div>

<div id="game-container"></div>

<div id="hud">
  <div class="hud-panel">
    <div class="hud-label">Berrys</div>
    <div class="hud-value" id="score">0</div>
  </div>
  <div class="hud-panel">
    <div class="hud-label">Vie</div>
    <div id="health-wrap"><div id="health-bar"></div></div>
    <div class="hud-label" style="margin-top:4px">Prime</div>
    <div style="font-size:12px;color:#FFD700" id="bounty">0</div>
  </div>
  <div class="hud-panel" style="text-align:center">
    <div class="hud-label">Étoiles</div>
    <div id="stars">⭐⭐⭐⭐⭐</div>
  </div>
</div>

<div id="crew-tag"></div>

<div id="minimap-wrap">
  <canvas id="minimap" width="120" height="120"></canvas>
</div>

<div id="speed-box">
  <div class="sn" id="speed">0</div>
  <div class="su">nœuds</div>
</div>

<div id="interact-hint"></div>
<div id="notification"></div>

<div id="joystick-zone">
  <div id="joystick-base"></div>
  <div id="joystick-thumb"></div>
</div>

<div id="cam-zone"></div>

<div id="buttons">
  <button class="btn" ontouchstart="doSprint()" onclick="doSprint()">🍖 Sprint</button>
  <button class="btn" id="vehicle-btn" ontouchstart="tryVehicle()" onclick="tryVehicle()">MONTER</button>
  <button class="btn" id="attack-btn" ontouchstart="doAttack()" onclick="doAttack()">⚡ Pistol</button>
</div>

<div id="ctrl-hint">
  WASD / ↑↓←→ Déplacer<br>
  Souris : Caméra &nbsp;·&nbsp; E : Véhicule<br>
  Espace : Attaque
</div>

<script src="js/three.min.js"></script>
<script src="js/game.js"></script>

<script>
  (function() {
    var bar = document.getElementById('lbar');
    var pct = 0;
    var iv = setInterval(function() {
      pct += Math.random() * 18;
      if (pct >= 95) { pct = 95; clearInterval(iv); }
      bar.style.width = pct + '%';
    }, 100);
    window.addEventListener('load', function() {
      bar.style.width = '100%';
      setTimeout(function() {
        var l = document.getElementById('loading');
        l.style.transition = 'opacity 0.6s';
        l.style.opacity = '0';
        setTimeout(function() { l.style.display = 'none'; }, 700);
      }, 500);
    });
  })();
</script>
</body>
</html>
